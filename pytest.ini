# testpaths exists for one reason: qt_tests/ must never be collected in the same
# process as tests/. Both install a Qt into aqt.qt, and every internpearls module
# binds its Qt names at import time, so whichever lands first wins for the whole
# process and the other suite silently asserts against the wrong widgets. A bare
# `pytest` from this directory would collect both. Pinning it to tests/ makes the
# real-Qt suite opt-in by path: `pytest qt_tests/`. See qt_tests/README.md.
[pytest]
testpaths = tests
